<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mathematical Garden</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="garden">
    <svg viewBox="0 0 1000 700" class="garden-svg">
      <circle id="seed" cx="500" cy="560" r="14" />

      <path
        id="curve"
        d="M 500 560 C 430 460, 570 370, 500 260"
      />

      <circle id="flower" cx="500" cy="240" r="42" />
    </svg>

    <div class="text">
      <h1>Mathematical Garden</h1>
      <p>A small world grown from a point, a curve, and motion.</p>
    </div>
  </main>

  <div class="scroll-space"></div>

  <script src="script.js"></script>
</body>
</html>
